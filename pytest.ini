[pytest]
# Both suites run by default. backend/tests/ holds the auth-fallback suite;
# pre-Foundation-Audit 2026-05-10 it was scoped out of the default run, which
# silently rotted (9/13 failing on cold-run). Keep both in scope so future
# drift is loud, not hidden behind a manual `pytest backend/tests/`.
testpaths = tests backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
