target-version = "py310"
line-length = 120

extend-exclude = [
    ".venv",
    "frontend",
    "data",
    "images",
    "admin",
    "scripts/archive",
]

[lint]
select = [
    "F",
    "E4",
    "E7",
    "E9",
    "W6",
]
ignore = [
    "E402",
    "E701",
    "E702",
    "E741",
    "F541",
]

[lint.per-file-ignores]
"backend/tests/**" = ["F401", "F811"]
"tests/**" = ["F401", "F811"]
"backend/database.py" = ["E501"]
